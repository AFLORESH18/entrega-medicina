<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrega Medicina Compleja</title>
    <style>
        :root {
            --primary-color: #1b4d3e;
            --secondary-color: #2c6e49;
            --light-bg: #f4f7f5;
            --white: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--white);
            width: 100%;
            max-width: 600px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            border-top: 5px solid var(--primary-color);
        }

        header {
            background-color: var(--primary-color);
            color: var(--white);
            text-align: center;
            padding: 20px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .step-container {
            padding: 30px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        h2 {
            font-size: 18px;
            color: var(--secondary-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-group-location {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-location {
            background-color: var(--white);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-location:hover {
            background-color: var(--primary-color);
            color: var(--white);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 5px rgba(44, 110, 73, 0.2);
        }

        .readonly-field {
            background-color: #e9ecef;
            cursor: not-allowed;
            font-weight: bold;
            color: var(--primary-color);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-submit {
            background-color: var(--secondary-color);
            color: var(--white);
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--primary-color);
        }

        .btn-back {
            background: none;
            border: none;
            color: #666;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            display: block;
            text-align: center;
            width: 100%;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
            color: var(--secondary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Entrega Medicina Compleja</h1>
    </header>

    <div class="step-container">
        <div id="step1" class="step active">
            <h2>Registrar nueva entrega en:</h2>
            <div class="btn-group-location">
                <button type="button" class="btn-location" onclick="selectLocation('PIURA')">PIURA</button>
                <button type="button" class="btn-location" onclick="selectLocation('AREQUIPA')">AREQUIPA</button>
            </div>
        </div>

        <div id="step2" class="step">
            <form id="deliveryForm">
                <div class="form-group">
                    <label>Sede de Registro</label>
                    <input type="text" id="sede" name="sede" class="readonly-field" readonly>
                </div>

                <div class="form-group">
                    <label for="n_pedido">N° pedido *</label>
                    <input type="text" id="n_pedido" name="n_pedido" required placeholder="Ej. PED-12345">
                </div>

                <div class="form-group">
                    <label for="guia_remision">Guía de remisión *</label>
                    <input type="text" id="guia_remision" name="guia_remision" required placeholder="Ej. GR-001-9876">
                </div>

                <div class="form-group">
                    <label for="persona_recibe">Persona que recibe *</label>
                    <input type="text" id="persona_recibe" name="persona_recibe" required placeholder="Nombre completo">
                </div>

                <div class="form-group">
                    <label for="dni_recibe">DNI (Persona que recibe) *</label>
                    <input type="text" id="dni_recibe" name="dni_recibe" required pattern="[0-9]{8}" title="Debe contener exactamente 8 dígitos numéricos" placeholder="8 dígitos">
                </div>

                <div class="form-group">
                    <label for="temperatura">Temperatura (°C) *</label>
                    <input type="number" id="temperatura" name="temperatura" step="0.1" required placeholder="Ej. 4.5">
                </div>

                <div class="form-group">
                    <label for="num_sensor">Número de sensor *</label>
                    <input type="text" id="num_sensor" name="num_sensor" required placeholder="Código del sensor">
                </div>

                <div class="form-group">
                    <label for="hora_entrega">Hora de entrega *</label>
                    <input type="time" id="hora_entrega" name="hora_entrega" required>
                </div>

                <div class="form-group">
                    <label for="comentarios">Comentarios (Opcional)</label>
                    <textarea id="comentarios" name="comentarios" placeholder="Notas o incidencias adicionales..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Guardar Registro</button>
                <button type="button" class="btn-back" onclick="goBack()">← Volver a seleccionar sede</button>
                
                <div id="loader" class="loader">Enviando datos a Google Drive... Por favor, espere.</div>
            </form>
        </div>
    </div>
</div>

<script>
    // URL de tu Web App de Google Apps Script (Se reemplazará en el paso a paso)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz1P-tMKzLL_nBZpVuZNYV6qUmkOYIRiHt_1YMKhJJji-f3D88OgiyrSwbi3seOLn-8kA/exec";

    function selectLocation(location) {
        document.getElementById('sede').value = location;
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    }

    function goBack() {
        document.getElementById('deliveryForm').reset();
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
    }

    document.getElementById('deliveryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const loader = document.getElementById('loader');
        const submitBtn = document.querySelector('.btn-submit');
        
        loader.style.display = 'block';
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.5';

        const formData = new FormData(this);
        
        // Convertimos FormData a un objeto plano
        const data = {};
        formData.forEach((value, key) => { data[key] = value });

        // Enviar datos mediante POST a Google Apps Script
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Necesario para evitar bloqueos de CORS con Apps Script
            headers: {
                'Content-Type': 'application/json'
            }
            body: JSON.stringify(data)
        })
        .then(() => {
            alert('¡Registro de entrega guardado exitosamente en Google Drive!');
            loader.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            goBack(); // Resetea y vuelve a la pantalla inicial
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Hubo un error al guardar los datos. Inténtalo de nuevo.');
            loader.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
        });
    });
</script>

</body>
</html>
